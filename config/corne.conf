# ╔══════════════════════════════════════════════════════════════╗
# ║           Corne ZMK — Configuración Optimizada              ║
# ║  Prioridades: batería · tap-dance · homerow · RGB · display  ║
# ╚══════════════════════════════════════════════════════════════╝


# ── COMPORTAMIENTO Y SISTEMA ────────────────────────────────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ── DEBOUNCE (Optimizado para respuesta rápida) ─────────────────
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ── BLUETOOTH ────────────────────────────────────────────────────
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_MAX_CONN=4
CONFIG_BT_MAX_PAIRED=4

# ── AHORRO DE ENERGÍA ────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Gestión de batería
#CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# ── RGB / UNDERGLOW ──────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# Apagar LEDs si no hay carga por USB para salvar batería
#CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=60

# ── DISPLAY ──────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# Necesario para el movimiento del Bongo Cat
#CONFIG_ZMK_WPM=y
#CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y