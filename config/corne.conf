# ╔══════════════════════════════════════════════════════════════╗
# ║           Corne ZMK — Configuración Optimizada              ║
# ║  Prioridades: batería · tap-dance · homerow · RGB · display  ║
# ╚══════════════════════════════════════════════════════════════╝


# ── COMPORTAMIENTO DE TECLAS ─────────────────────────────────────

# Tap-dance: tiempo máximo entre taps (debe coincidir con el keymap)
CONFIG_ZMK_BEHAVIOR_TAP_DANCE=y

# Hold-tap: necesario para homerow mods
CONFIG_ZMK_BEHAVIOR_HOLD_TAP=y

# Tiempo global de hold-tap en ms (respaldo; el keymap lo sobreescribe a 200)
CONFIG_ZMK_HOLD_TAP_DEFAULT_FLAVOR="tap-preferred"

# Macro support (necesario para los símbolos de apertura/cierre)
CONFIG_ZMK_BEHAVIOR_MACRO=y


# ── DEBOUNCE ─────────────────────────────────────────────────────
# Press muy bajo (1 ms) para respuesta rápida; release más alto evita
# rebotes al soltar — ideal con switches de baja actuation.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10


# ── BLUETOOTH ────────────────────────────────────────────────────
# Potencia de TX alta para mayor alcance inalámbrico
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Seguridad BT: requiere emparejamiento con confirmación de número
# (evita conexiones no autorizadas)
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Perfiles BT activos (default 5, reducir a 4 ahorra RAM mínimamente)
CONFIG_BT_MAX_CONN=4
CONFIG_BT_MAX_PAIRED=4


# ── AHORRO DE ENERGÍA — SUEÑO Y SUSPENSIÓN ───────────────────────

# Habilitar deep sleep (la opción más importante para batería)
CONFIG_ZMK_SLEEP=y

# Tiempo sin actividad antes de entrar en deep sleep: 15 minutos
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Tiempo antes de apagar pantalla y RGB (idle, no sleep): 60 segundos
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Apagar RGB en idle automáticamente
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Apagar RGB al entrar en deep sleep
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# Brillo inicial del RGB al encender (0–100). Bajo = más batería.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20

# Reducir intervalo de reporte de batería a 60 s (default 60000 ms)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Activar lectura de nivel de batería
CONFIG_ZMK_BATTERY_LEVEL_FETCHER=y


# ── RGB / UNDERGLOW ──────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Efecto de inicio (0 = sólido; menos cómputo → menos consumo)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# Velocidad del efecto (irrelevante en modo sólido, pero bajo por si acaso)
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=50


# ── DISPLAY ──────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
#CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Invertir colores de pantalla (fondo negro = menos energía en OLED)
CONFIG_ZMK_DISPLAY_INVERT=n

# Apagar pantalla en idle (se reactiva al presionar tecla)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y


# ── ZMK STUDIO (actualización de keymap en tiempo real) ──────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n


# ── LOGGING (solo activar para depuración, consume mucha energía) ─
# CONFIG_ZMK_USB_LOGGING=y
# CONFIG_ZMK_LOG_LEVEL_DBG=y


# ── OPTIMIZACIONES DE SISTEMA / ZEPHYR RTOS ──────────────────────

# Reducir tamaño de stack de logging para liberar RAM
CONFIG_LOG_BUFFER_SIZE=512

# Deshabilitar modo CDC-ACM serial cuando no se depura (ahorra energía USB)
CONFIG_USB_CDC_ACM=n

# Compilación con optimización de tamaño (reduce flash y mejora caché)
CONFIG_SIZE_OPTIMIZATIONS=y